services:
  postgres:
    image: postgres:17-alpine
    container_name: open-ggdashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: open_ggdashboard
    ports:
      - "4203:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
